<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — The Life Navigator</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 50%, #0d1b2a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #e6edf3;
    }

    /* ── Header ── */
    .brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 900;
      background: linear-gradient(90deg, #00c6ff, #ffcc00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }
    .brand p {
      font-size: 0.85rem;
      color: #8b949e;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    /* ── Card ── */
    .card {
      background: rgba(22, 27, 34, 0.95);
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 24px;
      color: #e6edf3;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Form ── */
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .field input,
    .field select {
      width: 100%;
      padding: 12px 14px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 0.95rem;
      font-family: 'Poppins', sans-serif;
      transition: border-color 0.2s;
      outline: none;
    }
    .field input:focus,
    .field select:focus { border-color: #0073e6; }
    .field select option { background: #0d1117; }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .pw-toggle {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: #8b949e; cursor: pointer;
      font-size: 1rem; padding: 4px;
    }
    .pw-toggle:hover { color: #e6edf3; }

    .row-check {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: #8b949e;
      margin-bottom: 20px;
    }
    .row-check input[type="checkbox"] { accent-color: #0073e6; }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #0073e6, #00c6ff);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Exam Countdown ── */
    .countdowns {
      margin-top: 28px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 18px;
    }
    .countdowns h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #ffcc00;
      margin-bottom: 14px;
      text-align: center;
    }
    .exam-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .exam-box {
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .exam-box .label { opacity: 0.9; margin-bottom: 4px; }
    .exam-box .timer { font-family: 'Orbitron', monospace; font-size: 0.7rem; }
    .neet    { background: #1a3a23; color: #4ade80; border: 1px solid #28a745; }
    .jee-m   { background: #1a2a3a; color: #60a5fa; border: 1px solid #007bff; }
    .jee-adv { background: #3a1a1a; color: #f87171; border: 1px solid #ff6f61; }
    .gate    { background: #3a2e0a; color: #fbbf24; border: 1px solid #ffb400; }

    /* ── Clock ── */
    .clock {
      text-align: center;
      font-size: 0.8rem;
      color: #8b949e;
      margin-top: 16px;
    }

    /* ── Loader Overlay ── */
    #loader {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .rings { display: flex; gap: 10px; }
    .ring {
      width: 18px; height: 18px;
      border-radius: 50%;
      animation: ringpulse 1.2s ease-in-out infinite;
    }
    .ring:nth-child(1) { background: #28a745; animation-delay: 0s; }
    .ring:nth-child(2) { background: #0073e6; animation-delay: 0.2s; }
    .ring:nth-child(3) { background: #ff6f61; animation-delay: 0.4s; }
    .ring:nth-child(4) { background: #ffcc00; animation-delay: 0.6s; }
    @keyframes ringpulse {
      0%,100% { transform: scale(0.7); opacity: 0.5; }
      50%      { transform: scale(1.3); opacity: 1; }
    }
    .loader-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      color: #00c6ff;
      letter-spacing: 2px;
    }
    .loader-quote {
      font-size: 0.85rem;
      color: #ffcc00;
      font-style: italic;
      max-width: 300px;
      text-align: center;
    }

    @media (max-width: 480px) {
      .card { padding: 24px 18px; }
      .exam-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <div class="brand">
    <h1>THE LIFE NAVIGATOR</h1>
    <p>Parents &amp; Students Portal</p>
  </div>

  <div class="card">
    <h2>🎮 Login to your account</h2>

    <form id="loginForm" autocomplete="off">
      <div class="field">
        <label>👤 Username (Mobile Number)</label>
        <input type="text" id="username" placeholder="Enter your mobile number" required autocomplete="username">
      </div>

      <div class="field">
        <label>🔑 Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" class="pw-toggle" id="pwToggle" title="Show/hide password">
            <i class="fas fa-eye" id="pwIcon"></i>
          </button>
        </div>
      </div>

      <div class="field">
        <label>📚 Select Class / Category</label>
        <select id="class" required>
          <option value="">-- Select Class/Category --</option>
          <optgroup label="Primary">
            <option value="LKG">LKG</option>
            <option value="UKG">UKG</option>
            <option value="Class1">Class 1</option>
            <option value="Class2">Class 2</option>
            <option value="Class3">Class 3</option>
            <option value="Class4">Class 4</option>
            <option value="Class5">Class 5</option>
          </optgroup>
          <optgroup label="Middle School">
            <option value="Class6">Class 6</option>
            <option value="Class7">Class 7</option>
            <option value="Class8">Class 8</option>
          </optgroup>
          <optgroup label="High School">
            <option value="Class9">Class 9</option>
            <option value="Class10">Class 10</option>
          </optgroup>
          <optgroup label="Intermediate">
            <option value="Class11">Class 11 (Inter I Year)</option>
            <option value="Class12">Class 12 (Inter II Year)</option>
          </optgroup>
        </select>
      </div>

      <div class="row-check">
        <input type="checkbox" id="rememberMe">
        <label for="rememberMe">Remember me on this device</label>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <i class="fas fa-rocket"></i> &nbsp;Launch Dashboard
      </button>
    </form>

    <div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
      <a href="./teacher_login.html"
         style="flex:1;min-width:140px;text-align:center;background:linear-gradient(90deg,#0d47a1,#1565c0);color:#fff;padding:10px 16px;border-radius:8px;text-decoration:none;font-size:.82rem;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;">
        <i class="fas fa-chalkboard-teacher"></i> Teacher Login
      </a>
      <a href="./admin_login.html"
         style="flex:1;min-width:140px;text-align:center;background:linear-gradient(90deg,#4a148c,#7b1fa2);color:#fff;padding:10px 16px;border-radius:8px;text-decoration:none;font-size:.82rem;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;">
        <i class="fas fa-cog"></i> Admin Login
      </a>
    </div>

    <!-- Exam Countdowns -->
    <div class="countdowns">
      <h3>🚀 Exam Countdowns 2026</h3>
      <div class="exam-grid">
        <div class="exam-box neet">
          <div class="label">🩺 NEET 2026</div>
          <div class="timer" id="neetTimer">–</div>
        </div>
        <div class="exam-box jee-m">
          <div class="label">📘 JEE Main</div>
          <div class="timer" id="jeeMainTimer">–</div>
        </div>
        <div class="exam-box jee-adv">
          <div class="label">🚀 JEE Adv</div>
          <div class="timer" id="jeeAdvTimer">–</div>
        </div>
        <div class="exam-box gate">
          <div class="label">⚙️ GATE 2026</div>
          <div class="timer" id="gateTimer">–</div>
        </div>
      </div>
    </div>

    <div class="clock" id="clock">–</div>
  </div>

  <!-- Loader -->
  <div id="loader">
    <div class="rings">
      <div class="ring"></div><div class="ring"></div>
      <div class="ring"></div><div class="ring"></div>
    </div>
    <div class="loader-text">NAVIGATING...</div>
    <div class="loader-quote" id="loaderQuote">Preparing your journey...</div>
  </div>

<script>
  // ── Config ───────────────────────────────────────────────────────────────
  const AUTH_URL = 'https://script.google.com/macros/s/AKfycbxciYsOSxiKN2k9FWMdFuqpt5OKkp6EDsSp2xPmfZcGARVAXWdhbQTIYHabMygnRhk/exec';
  const GAS_URL  = AUTH_URL; // same script handles everything

  // ── Show/Hide Password ────────────────────────────────────────────────────
  document.getElementById('pwToggle').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const icon = document.getElementById('pwIcon');
    if (pw.type === 'password') {
      pw.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      pw.type = 'password';
      icon.className = 'fas fa-eye';
    }
  });

  // ── Remember Me ───────────────────────────────────────────────────────────
  window.addEventListener('load', () => {
    const u = localStorage.getItem('savedUsername');
    const p = localStorage.getItem('savedPassword');
    const c = localStorage.getItem('savedClass');
    if (u && p) {
      document.getElementById('username').value = u;
      document.getElementById('password').value = p;
      document.getElementById('rememberMe').checked = true;
    }
    if (c) document.getElementById('class').value = c;
  });

  // ── Countdown ─────────────────────────────────────────────────────────────
  function startCountdown(id, targetDate) {
    setInterval(() => {
      const diff = new Date(targetDate) - Date.now();
      if (diff <= 0) { document.getElementById(id).textContent = 'Exam Over'; return; }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById(id).textContent = `${d}d ${h}h ${m}m ${s}s`;
    }, 1000);
  }
  startCountdown('neetTimer',    '2026-05-03T09:00:00');
  startCountdown('jeeMainTimer', '2026-04-05T09:00:00');
  startCountdown('jeeAdvTimer',  '2026-05-24T09:00:00');
  startCountdown('gateTimer',    '2026-02-07T09:00:00');

  // ── Clock ─────────────────────────────────────────────────────────────────
  setInterval(() => {
    const now = new Date();
    document.getElementById('clock').textContent =
      '📅 ' + now.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' }) +
      '  ⏰ ' + now.toLocaleTimeString();
  }, 1000);

  // ── Motivational Quotes ───────────────────────────────────────────────────
  const QUOTES = [
    'Every second counts ⏳',
    'Focus sharpens success 🎯',
    'Great things take time ⌛',
    'Keep pushing forward 🚀',
    'Your hard work will pay off 💪',
    'Dream big. Start small. Act now 🌟',
    'Champions train, losers complain 🏆'
  ];
  setInterval(() => {
    document.getElementById('loaderQuote').textContent =
      QUOTES[Math.floor(Math.random() * QUOTES.length)];
  }, 2200);

  // ── Login ─────────────────────────────────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn    = document.getElementById('loginBtn');
    const loader = document.getElementById('loader');
    const username      = document.getElementById('username').value.trim();
    const password      = document.getElementById('password').value.trim();
    const selectedClass = document.getElementById('class').value;
    const rememberMe    = document.getElementById('rememberMe').checked;

    if (!username || !password || !selectedClass) {
      alert('Please fill in all fields.');
      return;
    }

    btn.disabled = true;
    loader.style.display = 'flex';

    try {
      // Google Apps Script drops GET params on redirect — use POST instead
      // doPost already handles username+password+class and returns userData
      const authRes  = await fetch(AUTH_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'username=' + encodeURIComponent(username) +
              '&password=' + encodeURIComponent(password) +
              '&class=' + encodeURIComponent(selectedClass)
      });
      const authData = await authRes.json();

      if (authData.result !== 'success') {
        throw new Error('Invalid username or password.');
      }

      // userData comes from doPost — same field names as always
      const u = authData.userData || {};
      localStorage.setItem('userId',         u.userId         || username);
      localStorage.setItem('className',      selectedClass);
      localStorage.setItem('studentName',    u.studentName    || username);
      localStorage.setItem('parentName',     u.parentName     || '');
      localStorage.setItem('schoolName',     u.schoolName     || '');
      localStorage.setItem('schoolURL',      u.schoolURL      || '');
      localStorage.setItem('quoteUrl',       u.quoteUrl       || '');
      localStorage.setItem('imageUrl1',      u.imageUrl1      || '');
      localStorage.setItem('imageUrl2',      u.imageUrl2      || '');
      localStorage.setItem('videoUrl',       u.videoUrl       || '');
      localStorage.setItem('videoTitle',     u.videoTitle     || '');
      localStorage.setItem('videoUrl2',      u.videoUrl2      || '');
      localStorage.setItem('videoTitle2',    u.videoTitle2    || '');
      localStorage.setItem('videoUrl3',      u.videoUrl3      || '');
      localStorage.setItem('videoTitle3',    u.videoTitle3    || '');
      localStorage.setItem('videoUrl4',      u.videoUrl4      || '');
      localStorage.setItem('videoTitle4',    u.videoTitle4    || '');
      localStorage.setItem('videoUrl5',      u.videoUrl5      || '');
      localStorage.setItem('videoUrl6',      u.videoUrl6      || '');
      localStorage.setItem('schoolMessage1', u.schoolMessage  || '');
      localStorage.setItem('schoolMessage2', u.schoolMessage2 || '');
      localStorage.setItem('attendance',     u.attendance     || '');
      localStorage.setItem('rollNumber',     u.studentRollNumber || '');
      localStorage.setItem('hasSubmitted',   authData.hasSubmitted ? 'true' : 'false');

      if (rememberMe) {
        localStorage.setItem('savedUsername', username);
        localStorage.setItem('savedPassword', password);
        localStorage.setItem('savedClass',    selectedClass);
      } else {
        localStorage.removeItem('savedUsername');
        localStorage.removeItem('savedPassword');
        localStorage.removeItem('savedClass');
      }

      // Step 4: Redirect
      setTimeout(() => {
        if (['Class11', 'Class12'].includes(selectedClass)) {
          window.location.href = 'https://neet-f77i.onrender.com';
        } else {
          window.location.href = './parents_homepage.html';
        }
      }, 1800);

    } catch (err) {
      loader.style.display = 'none';
      btn.disabled = false;
      alert(err.message || 'An error occurred. Please try again.');
    }
  });
</script>
</body>
</html>
