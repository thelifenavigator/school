<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — The Life Navigator</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#1a0533 0%,#2d1b69 50%,#1a0533 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;color:#e6edf3}
    .brand{text-align:center;margin-bottom:28px}
    .brand h1{font-family:'Orbitron',sans-serif;font-size:clamp(1.2rem,4vw,1.8rem);font-weight:900;background:linear-gradient(90deg,#ce93d8,#ffcc00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
    .brand p{font-size:.82rem;color:#9c72b5;margin-top:4px;letter-spacing:1px}
    .card{background:rgba(22,11,44,.95);border:1px solid #4a148c;border-radius:16px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(74,20,140,.4)}
    .card h2{font-size:1rem;font-weight:600;margin-bottom:24px;color:#ce93d8;display:flex;align-items:center;gap:8px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:.75rem;color:#9c72b5;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
    .field input,.field select{width:100%;padding:12px 14px;background:#0d0019;border:1px solid #4a148c;border-radius:8px;color:#e6edf3;font-size:.95rem;font-family:'Poppins',sans-serif;outline:none;transition:border-color .2s}
    .field input:focus,.field select:focus{border-color:#ce93d8}
    .field select option{background:#0d0019}
    .pw-wrap{position:relative}
    .pw-wrap input{padding-right:44px}
    .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#9c72b5;cursor:pointer;font-size:1rem;padding:4px}
    .btn-login{width:100%;padding:14px;background:linear-gradient(90deg,#4a148c,#7b1fa2);border:none;border-radius:8px;color:#fff;font-size:1rem;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;letter-spacing:1px;transition:opacity .2s,transform .2s;margin-top:4px}
    .btn-login:hover{opacity:.9;transform:translateY(-1px)}
    .btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .back-link{text-align:center;margin-top:16px;font-size:.82rem;color:#9c72b5}
    .back-link a{color:#ce93d8;text-decoration:none}
    .back-link a:hover{text-decoration:underline}
    .role-badge{display:inline-flex;align-items:center;gap:6px;background:#2d1560;border:1px solid #4a148c;border-radius:999px;padding:4px 14px;font-size:.75rem;color:#ce93d8;margin-bottom:20px}
    #loader{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:16px}
    .spin-ring{width:44px;height:44px;border:4px solid #30363d;border-top-color:#ce93d8;border-radius:50%;animation:spin .9s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .err-msg{background:#2a0a2a;border:1px solid #e53935;border-radius:8px;padding:10px 14px;font-size:.82rem;color:#f87171;margin-bottom:14px;display:none}
  </style>
</head>
<body>
  <div class="brand">
    <h1>THE LIFE NAVIGATOR</h1>
    <p>Administration Portal</p>
  </div>

  <div class="card">
    <div class="role-badge"><i class="fas fa-cog"></i> Admin / Principal Access</div>
    <h2><i class="fas fa-shield-alt"></i> Admin Login</h2>

    <div class="err-msg" id="errMsg"></div>

    <form id="adminLoginForm">
      <div class="field">
        <label>👤 Username</label>
        <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
      </div>
      <div class="field">
        <label>🔑 Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" class="pw-toggle" onclick="togglePw()"><i class="fas fa-eye" id="pwIcon"></i></button>
        </div>
      </div>
      <div class="field">
        <label>📋 Role</label>
        <select id="roleSelect">
          <option value="Principal">Principal (Admin)</option>
          <option value="Marketing">Marketing</option>
        </select>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> &nbsp;Enter Admin Portal
      </button>
    </form>

    <div class="back-link">
      <a href="./login.html"><i class="fas fa-arrow-left"></i> Student / Parent Login</a>
      &nbsp;|&nbsp;
      <a href="./teacher_login.html"><i class="fas fa-chalkboard-teacher"></i> Teacher Login</a>
    </div>
  </div>

  <div id="loader">
    <div class="spin-ring"></div>
    <p style="font-size:.85rem;color:#9c72b5">Verifying credentials…</p>
  </div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxciYsOSxiKN2k9FWMdFuqpt5OKkp6EDsSp2xPmfZcGARVAXWdhbQTIYHabMygnRhk/exec';

  // If already logged in as admin, go straight in
  if (localStorage.getItem('userId') && ['Principal','Marketing'].includes(localStorage.getItem('className'))) {
    window.location.replace('./admin.html');
  }

  function togglePw() {
    const pw = document.getElementById('password');
    const ic = document.getElementById('pwIcon');
    pw.type = pw.type === 'password' ? 'text' : 'password';
    ic.className = pw.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
  }

  function showErr(msg) {
    const el = document.getElementById('errMsg');
    el.textContent = msg; el.style.display = 'block';
  }

  document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn      = document.getElementById('loginBtn');
    const loader   = document.getElementById('loader');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const role     = document.getElementById('roleSelect').value;

    document.getElementById('errMsg').style.display = 'none';
    if (!username || !password) { showErr('Please fill all fields.'); return; }

    btn.disabled = true;
    loader.style.display = 'flex';

    try {
      const res  = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'username=' + encodeURIComponent(username) +
              '&password=' + encodeURIComponent(password) +
              '&class='    + encodeURIComponent(role)
      });
      const data = await res.json();

      if (data.result !== 'success') {
        throw new Error('Invalid admin username or password.');
      }

      const u = data.userData || {};
      localStorage.setItem('userId',      username);
      localStorage.setItem('className',   role);
      localStorage.setItem('studentName', u.studentName || username);
      localStorage.setItem('adminId',     username);

      setTimeout(() => { window.location.href = './admin.html'; }, 1000);

    } catch (err) {
      loader.style.display = 'none';
      btn.disabled = false;
      showErr(err.message || 'Login failed. Please try again.');
    }
  });
</script>
</body>
</html>
